model_name: qwen3vl4b
repo_id: Qwen/Qwen3-VL-4B-Instruct
loader_class: Qwen3VLLoader

# Same architecture/loader as qwen3vl2b.yaml, larger checkpoint. Starting
# from EVERYTHING already proven for the 2B this session - the two-call
# subject_keywords split, the <END> stop_string, repetition_penalty=1.15/
# no_repeat_ngram_size=5 (the stable combination found after significant
# tuning on 2B) - rather than re-deriving these blind for a new size.
# UNTESTED at this size specifically - worth confirming these settings
# transfer, not assuming a larger checkpoint behaves identically.

do_sample: false
temperature: 0.7
top_p: 0.8
top_k: 20
repetition_penalty: 1.15
no_repeat_ngram_size: 5
max_new_tokens: 512

stop_string: "<END>"
keywords_max_new_tokens: 80

min_pixels: null
max_pixels: null

reasoning_toggle_mechanism: unsupported
reasoning_enabled: false

prompt_version: v1
prompt_text: ""

vram_headroom_gb: 1.5
cpu_offload_limit_gb: 48.0
